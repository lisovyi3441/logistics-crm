services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: logistics-crm:latest
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      # Make sure the application listens to standard HTTP headers for HTTPS redirection (since it's behind a proxy)
      - TRUSTED_PROXIES=* 
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/app/public:/var/www/html/storage/app/public
    networks:
      - shared_network

networks:
  shared_network:
    external: true
