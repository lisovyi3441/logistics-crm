services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: logistics-crm:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - TRUSTED_PROXIES=* 
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-sail}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-password}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_BUCKET=${AWS_BUCKET:-local}
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - AWS_ENDPOINT=http://minio:9000
    volumes:
      - ./storage/logs:/app/storage/logs
      - ./storage/app/public:/app/storage/app/public
    networks:
      - shared_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: logistics-crm:latest
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-sail}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-password}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_BUCKET=${AWS_BUCKET:-local}
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - AWS_ENDPOINT=http://minio:9000
    volumes:
      - ./storage/logs:/app/storage/logs
      - ./storage/app/public:/app/storage/app/public
    networks:
      - shared_network
    depends_on:
      - app

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: "${AWS_ACCESS_KEY_ID:-sail}"
      MINIO_ROOT_PASSWORD: "${AWS_SECRET_ACCESS_KEY:-password}"
    command: server /data --console-address ":8900"
    volumes:
      - ./storage/minio:/data
    networks:
      - shared_network

  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-sail}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-password}"
      AWS_BUCKET: "${AWS_BUCKET:-local}"
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 \${AWS_ACCESS_KEY_ID} \${AWS_SECRET_ACCESS_KEY};
      /usr/bin/mc mb myminio/\${AWS_BUCKET} --ignore-existing;
      /usr/bin/mc anonymous set public myminio/\${AWS_BUCKET};
      exit 0;
      "
    networks:
      - shared_network

networks:
  shared_network:
    external: true
