services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: logistics-crm:latest
    restart: unless-stopped
    mem_limit: 256m
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - TRUSTED_PROXIES=* 
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-sail}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-password}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_BUCKET=${AWS_BUCKET:-local}
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - AWS_ENDPOINT=http://minio:9000
      - AWS_URL=${AWS_URL:-https://s3.lisovyi.me/local}
    volumes:
      - ./storage/logs:/app/storage/logs
      - ./storage/app/public:/app/storage/app/public
    networks:
      - shared_network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  queue:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: logistics-crm:latest
    restart: unless-stopped
    mem_limit: 128m
    command: php artisan queue:work --tries=3 --timeout=90
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-sail}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-password}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_BUCKET=${AWS_BUCKET:-local}
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - AWS_ENDPOINT=http://minio:9000
      - AWS_URL=${AWS_URL:-https://s3.lisovyi.me/local}
    volumes:
      - ./storage/logs:/app/storage/logs
      - ./storage/app/public:/app/storage/app/public
    networks:
      - shared_network
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

  reverb:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: logistics-crm:latest
    restart: unless-stopped
    mem_limit: 128m
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    networks:
      - shared_network
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  shared_network:
    external: true
