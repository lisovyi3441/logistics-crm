services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: logistics-crm:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - TRUSTED_PROXIES=* 
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-sail}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-password}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_BUCKET=${AWS_BUCKET:-local}
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - AWS_ENDPOINT=http://global-minio:9000
    volumes:
      - ./storage/logs:/app/storage/logs
      - ./storage/app/public:/app/storage/app/public
    networks:
      - shared_network
    deploy:
      resources:
        limits:
          memory: 256M

  queue:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: logistics-crm:latest
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-sail}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-password}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_BUCKET=${AWS_BUCKET:-local}
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - AWS_ENDPOINT=http://global-minio:9000
    volumes:
      - ./storage/logs:/app/storage/logs
      - ./storage/app/public:/app/storage/app/public
    networks:
      - shared_network
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 128M



networks:
  shared_network:
    external: true
