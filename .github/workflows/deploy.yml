name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          script: |
            cd ${{ secrets.DO_PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main
            
            # Build and start the production container
            docker compose -f docker-compose.prod.yml up -d --build
            
            # Wait a few seconds for the container to initialize
            sleep 5
            
            # Migrate database
            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force
            
            # Clear caches
            docker compose -f docker-compose.prod.yml exec -T app php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T app php artisan route:cache
            docker compose -f docker-compose.prod.yml exec -T app php artisan view:cache
            
            # Restart the container to reload Octane workers safely
            docker compose -f docker-compose.prod.yml restart app
            
            # Setup Cron for Laravel Scheduler
            (crontab -l 2>/dev/null | grep -q "schedule:run") || (crontab -l 2>/dev/null; echo "* * * * * cd ${{ secrets.DO_PROJECT_PATH }} && docker compose -f docker-compose.prod.yml exec -T app php artisan schedule:run >> /dev/null 2>&1") | crontab -
